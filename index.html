<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced PDF Editor</title>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            /* Dark Theme (Default) */
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --toolbar-bg: #000000;
            --text-color: #ffffff;
            --border-color: #333333;
            --accent-color: #ffffff;
            --accent-text: #000000;
            --hover-bg: #2a2a2a;
            --canvas-bg: #2c2c2c;
            --log-bg: #000000;
            --log-text: #00ff00;
        }[data-theme="light"] {
            /* Light Theme */
            --bg-color: #f5f5f5;
            --panel-bg: #ffffff;
            --toolbar-bg: #e0e0e0;
            --text-color: #000000;
            --border-color: #cccccc;
            --accent-color: #000000;
            --accent-text: #ffffff;
            --hover-bg: #e8e8e8;
            --canvas-bg: #d0d0d0;
            --log-bg: #ffffff;
            --log-text: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Toolbar */
        .toolbar { background-color: var(--toolbar-bg); padding: 10px 20px; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; z-index: 100; }
        .toolbar-group { display: flex; gap: 5px; border-right: 1px solid var(--border-color); padding-right: 15px; align-items: center; }
        .toolbar-group:last-child { border-right: none; }
        
        button, label.btn { background: transparent; color: var(--text-color); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        button:hover, label.btn:hover { background: var(--hover-bg); }
        button.active { background: var(--accent-color); color: var(--accent-text); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        input[type="file"] { display: none; }

        /* Main Layout */
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* Sidebars */
        .sidebar { width: 250px; background-color: var(--panel-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow-y: auto; z-index: 10; }
        .sidebar-right { border-right: none; border-left: 1px solid var(--border-color); padding: 15px; }
        
        .panel-section { margin-bottom: 20px; }
        .panel-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; color: #888; }
        
        .prop-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .prop-row label { font-size: 12px; width: 60px; }
        select, input[type="number"], input[type="color"] { width: 100%; padding: 5px; background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 4px; }
        
        /* Thumbnails */
        .thumbnail { margin: 10px; border: 2px solid transparent; cursor: pointer; position: relative; transition: 0.2s; }
        .thumbnail:hover { border-color: #888; }
        .thumbnail.active { border-color: var(--accent-color); }
        .thumbnail canvas { width: 100%; display: block; background: white; }
        .thumbnail-label { text-align: center; font-size: 12px; padding: 5px; }

        /* Canvas Area */
        .canvas-wrapper { flex: 1; background-color: var(--canvas-bg); position: relative; overflow: hidden; outline: none; }
        
        /* Grid Overlay */
        .grid-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; background-size: 20px 20px; background-image: linear-gradient(to right, rgba(128,128,128,0.2) 1px, transparent 1px), linear-gradient(to bottom, rgba(128,128,128,0.2) 1px, transparent 1px); display: none; z-index: 5; }
        .grid-overlay.active { display: block; }

        /* Utilities */
        .icon-btn-group { display: flex; gap: 2px; }
        .icon-btn-group button { padding: 6px 8px; flex: 1; justify-content: center; }

        /* Loading Overlay & Logs */
        #loadingOverlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); color: white; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; gap: 15px; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #logContainer { width: 80%; max-width: 600px; height: 200px; background: var(--log-bg); color: var(--log-text); font-family: monospace; font-size: 12px; padding: 10px; overflow-y: auto; border-radius: 4px; border: 1px solid #444; text-align: left; }
        .log-info { color: #00ff00; }
        .log-warn { color: #ffff00; }
        .log-error { color: #ff0000; }
    </style>
</head>
<body>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-group">
            <label class="btn"><i class="fas fa-folder-open"></i> Open PDF<input type="file" id="fileInput" accept="application/pdf"></label>
            <button id="exportBtn" disabled><i class="fas fa-download"></i> Export</button>
        </div>
        <div class="toolbar-group">
            <button id="undoBtn" title="Undo (Ctrl+Z)"><i class="fas fa-undo"></i></button>
            <button id="redoBtn" title="Redo (Ctrl+Y)"><i class="fas fa-redo"></i></button>
        </div>
        <div class="toolbar-group">
            <button id="addTextBtn"><i class="fas fa-font"></i> Add Text</button>
            <label class="btn"><i class="fas fa-image"></i> Add Image<input type="file" id="imageInput" accept="image/*"></label>
            <button id="replaceAreaBtn" title="Draw a box over an existing image to replace it"><i class="fas fa-object-ungroup"></i> Replace Area</button>
        </div>
        <div class="toolbar-group">
            <button id="zoomOutBtn"><i class="fas fa-search-minus"></i></button>
            <span id="zoomLevel" style="font-size: 14px; width: 45px; text-align: center;">100%</span>
            <button id="zoomInBtn"><i class="fas fa-search-plus"></i></button>
            <button id="fitScreenBtn"><i class="fas fa-expand"></i> Fit</button>
        </div>
        <div class="toolbar-group">
            <button id="gridToggleBtn" title="Toggle Grid"><i class="fas fa-border-all"></i> Grid</button>
            <button id="snapToggleBtn" class="active" title="Snap to Grid/Elements"><i class="fas fa-magnet"></i> Snap</button>
            <button id="targetSnapBtn" title="Target Snap Mode"><i class="fas fa-crosshairs"></i> Target Snap</button>
        </div>
        <div class="toolbar-group" style="margin-left: auto;">
            <button id="themeToggleBtn"><i class="fas fa-adjust"></i> Theme</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <!-- Loading Overlay -->
        <div id="loadingOverlay">
            <div class="spinner"></div>
            <div id="loadingText" style="font-size: 20px; font-weight: bold;">Processing...</div>
            <div id="logContainer"></div>
        </div>

        <!-- Left Sidebar (Pages) -->
        <div class="sidebar" id="thumbnailsContainer">
            <div style="padding: 15px; text-align: center; color: #888; font-size: 13px;">Upload a PDF to begin</div>
        </div>

        <!-- Canvas Area -->
        <div class="canvas-wrapper" id="canvasWrapper" tabindex="0">
            <div class="grid-overlay" id="gridOverlay"></div>
            <canvas id="pdfCanvas"></canvas>
        </div>

        <!-- Right Sidebar (Properties) -->
        <div class="sidebar sidebar-right">
            <div class="panel-section">
                <h3>Alignment</h3>
                <div class="icon-btn-group">
                    <button id="alignCenterH" title="Center Horizontally"><i class="fas fa-arrows-alt-h"></i></button>
                    <button id="alignCenterV" title="Center Vertically"><i class="fas fa-arrows-alt-v"></i></button>
                </div>
            </div>

            <div class="panel-section">
                <h3>Arrange (Z-Index)</h3>
                <div class="icon-btn-group">
                    <button id="bringFrontBtn" title="Bring to Front"><i class="fas fa-angle-double-up"></i></button>
                    <button id="bringForwardBtn" title="Bring Forward"><i class="fas fa-angle-up"></i></button>
                    <button id="sendBackwardBtn" title="Send Backward"><i class="fas fa-angle-down"></i></button>
                    <button id="sendBackBtn" title="Send to Back"><i class="fas fa-angle-double-down"></i></button>
                </div>
            </div>

            <div class="panel-section" id="textProperties" style="display: none;">
                <h3>Text Formatting</h3>
                <div class="prop-row">
                    <select id="fontFamily">
                        <option value="Helvetica">Helvetica</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Courier">Courier</option>
                        <option value="Arial">Arial</option>
                    </select>
                </div>
                <div class="prop-row">
                    <label>Size</label>
                    <input type="number" id="fontSize" value="16" min="1">
                </div>
                <div class="prop-row">
                    <label>Color</label>
                    <input type="color" id="textColor" value="#000000">
                </div>
                <div class="icon-btn-group" style="margin-top: 10px;">
                    <button id="textAlignLeft"><i class="fas fa-align-left"></i></button>
                    <button id="textAlignCenter"><i class="fas fa-align-center"></i></button>
                    <button id="textAlignRight"><i class="fas fa-align-right"></i></button>
                    <button id="textAlignJustify"><i class="fas fa-align-justify"></i></button>
                </div>
            </div>

            <div class="panel-section">
                <h3>Element</h3>
                <button id="lockBtn" style="width: 100%; justify-content: center;"><i class="fas fa-lock"></i> Lock/Unlock</button>
                <button id="deleteBtn" style="width: 100%; justify-content: center; margin-top: 5px; color: #ff4444; border-color: #ff4444;"><i class="fas fa-trash"></i> Delete</button>
            </div>
        </div>
    </div>

    <script>
        // --- Verbose Logging System ---
        function logVerbose(msg, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            entry.className = `log-${type}`;
            entry.innerText = `[${time}] ${msg}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
            
            if (type === 'error') console.error(msg);
            else if (type === 'warn') console.warn(msg);
            else console.log(msg);
        }

        let loadingTimeout;
        function showLoading(show, text = "Processing...") {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').innerText = text;
            
            if (show) {
                overlay.style.display = 'flex';
                logVerbose(`--- ${text} ---`);
                // Failsafe: Auto-hide loading screen after 15 seconds to prevent permanent lock
                clearTimeout(loadingTimeout);
                loadingTimeout = setTimeout(() => {
                    if (overlay.style.display === 'flex') {
                        logVerbose("Loading timeout reached. Forcing overlay to close.", "warn");
                        overlay.style.display = 'none';
                    }
                }, 15000);
            } else {
                clearTimeout(loadingTimeout);
                overlay.style.display = 'none';
            }
        }

        // --- Configuration & State ---
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let pdfDoc = null;
        let currentPageNum = 1;
        let canvas;
        let pdfBytesOriginal = null;
        
        // State Management
        let pageCanvases = {}; 
        let pageHistories = {}; 
        let isHistoryAction = false;

        // Dimensions
        let currentPdfPageWidth = 0;
        let currentPdfPageHeight = 0;

        // Modes & Toggles
        let isPanning = false;
        let snapEnabled = true;
        let targetSnapMode = false;
        let targetElement = null;
        let isReplacingArea = false;
        let replaceRect = null;
        let replaceStartX = 0, replaceStartY = 0;
        const GRID_SIZE = 20;

        const wrapper = document.getElementById('canvasWrapper');

        // --- Initialization ---
        function init() {
            try {
                logVerbose("Initializing Fabric.js canvas...");
                canvas = new fabric.Canvas('pdfCanvas', {
                    preserveObjectStacking: true,
                    selection: true
                });

                // Initial sizing
                canvas.setWidth(wrapper.clientWidth || 800);
                canvas.setHeight(wrapper.clientHeight || 600);

                // Superior Resize Handling using ResizeObserver
                const resizeObserver = new ResizeObserver(entries => {
                    for (let entry of entries) {
                        const { width, height } = entry.contentRect;
                        if (width > 0 && height > 0 && pdfDoc) {
                            canvas.setWidth(width);
                            canvas.setHeight(height);
                            fitToScreen();
                        }
                    }
                });
                resizeObserver.observe(wrapper);

                setupEventListeners();
                setupKeyboardShortcuts();
                setupCanvasEvents();
                loadAutoSave();
                logVerbose("Initialization complete. Ready for PDF upload.");
            } catch (e) {
                logVerbose(`Initialization failed: ${e.message}`, "error");
            }
        }

        // --- PDF Loading & Rendering ---
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            showLoading(true, "Loading PDF...");
            try {
                logVerbose(`Reading file: ${file.name} (${file.size} bytes)`);
                const arrayBuffer = await file.arrayBuffer();
                pdfBytesOriginal = arrayBuffer;
                
                logVerbose("Parsing PDF structure with pdf.js...");
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                logVerbose(`PDF loaded successfully. Pages: ${pdfDoc.numPages}`);
                
                document.getElementById('exportBtn').disabled = false;
                document.getElementById('thumbnailsContainer').innerHTML = '';
                
                await renderThumbnails();
                await loadPage(1);
            } catch (error) {
                logVerbose(`Failed to load PDF: ${error.message}`, "error");
                alert("Failed to load PDF. Check logs.");
                showLoading(false);
            }
        });

        async function renderThumbnails() {
            logVerbose("Generating sidebar thumbnails...");
            const container = document.getElementById('thumbnailsContainer');
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 0.3 });
                
                const thumbWrapper = document.createElement('div');
                thumbWrapper.className = 'thumbnail';
                thumbWrapper.id = `thumb-${i}`;
                thumbWrapper.onclick = () => loadPage(i);

                const thumbCanvas = document.createElement('canvas');
                const ctx = thumbCanvas.getContext('2d');
                thumbCanvas.width = viewport.width;
                thumbCanvas.height = viewport.height;

                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                
                const label = document.createElement('div');
                label.className = 'thumbnail-label';
                label.innerText = `Page ${i}`;

                thumbWrapper.appendChild(thumbCanvas);
                thumbWrapper.appendChild(label);
                container.appendChild(thumbWrapper);
            }
            logVerbose("Thumbnails generated.");
        }

        async function loadPage(pageNum) {
            showLoading(true, `Loading Page ${pageNum}...`);
            try {
                if (pdfDoc && canvas.getObjects().length > 0) {
                    logVerbose(`Saving state for page ${currentPageNum} before switching.`);
                    pageCanvases[currentPageNum] = getCanvasState();
                }

                currentPageNum = pageNum;
                
                document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                const activeThumb = document.getElementById(`thumb-${pageNum}`);
                if(activeThumb) activeThumb.classList.add('active');

                logVerbose(`Fetching page ${pageNum} data...`);
                const page = await pdfDoc.getPage(pageNum);
                
                const unscaledViewport = page.getViewport({ scale: 1.0 });
                currentPdfPageWidth = unscaledViewport.width;
                currentPdfPageHeight = unscaledViewport.height;

                // Render at 2.0x for crispness
                const renderScale = 2.0; 
                const renderViewport = page.getViewport({ scale: renderScale });

                const tempCanvas = document.createElement('canvas');
                const ctx = tempCanvas.getContext('2d');
                tempCanvas.width = renderViewport.width;
                tempCanvas.height = renderViewport.height;

                logVerbose("Rendering PDF background to temporary canvas...");
                await page.render({ canvasContext: ctx, viewport: renderViewport }).promise;

                // Bulletproof Fabric Image Loading via DataURL
                logVerbose("Converting background to Data URL...");
                const dataUrl = tempCanvas.toDataURL('image/jpeg', 0.8);

                canvas.clear();

                fabric.Image.fromURL(dataUrl, (bgImage) => {
                    if (!bgImage) {
                        throw new Error("Fabric failed to create image from Data URL.");
                    }
                    bgImage.scale(1 / renderScale); // Scale down to match 1:1 coordinate system
                    
                    canvas.setBackgroundImage(bgImage, () => {
                        logVerbose("Background applied successfully.");
                        if (pageCanvases[pageNum]) {
                            logVerbose("Restoring previous edits for this page...");
                            canvas.loadFromJSON(pageCanvases[pageNum], () => {
                                canvas.setBackgroundImage(bgImage, () => {
                                    canvas.renderAll();
                                    if (!pageHistories[pageNum]) saveHistory();
                                    fitToScreen();
                                    showLoading(false);
                                });
                            });
                        } else {
                            if (!pageHistories[pageNum]) saveHistory();
                            fitToScreen();
                            showLoading(false);
                        }
                    });
                });
            } catch (error) {
                logVerbose(`Error loading page ${pageNum}: ${error.message}`, "error");
                showLoading(false);
            }
        }

        // --- Canvas Navigation (Zoom & Pan) ---
        canvas.on('mouse:wheel', function(opt) {
            var delta = opt.e.deltaY;
            var zoom = canvas.getZoom();
            zoom *= 0.999 ** delta;
            if (zoom > 5) zoom = 5;
            if (zoom < 0.1) zoom = 0.1;
            canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
            opt.e.preventDefault();
            opt.e.stopPropagation();
            updateZoomLabel();
            updateGrid();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                isPanning = true;
                canvas.defaultCursor = 'grab';
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                isPanning = false;
                canvas.defaultCursor = 'default';
            }
        });

        function fitToScreen() {
            if (!currentPdfPageWidth || !currentPdfPageHeight) return;
            
            let cw = wrapper.clientWidth;
            let ch = wrapper.clientHeight;
            
            // Prevent Infinity scale bug if wrapper is hidden or not painted yet
            if (cw === 0 || ch === 0) {
                logVerbose("Wrapper dimensions are 0. Waiting for ResizeObserver.", "warn");
                return; 
            }

            const padding = 40;
            const scaleX = (cw - padding) / currentPdfPageWidth;
            const scaleY = (ch - padding) / currentPdfPageHeight;
            const scale = Math.min(scaleX, scaleY);
            
            canvas.setZoom(scale);
            canvas.viewportTransform[4] = (cw - currentPdfPageWidth * scale) / 2;
            canvas.viewportTransform[5] = (ch - currentPdfPageHeight * scale) / 2;
            canvas.requestRenderAll();
            updateZoomLabel();
            updateGrid();
        }

        function updateZoomLabel() {
            document.getElementById('zoomLevel').innerText = Math.round(canvas.getZoom() * 100) + '%';
        }

        function updateGrid() {
            const grid = document.getElementById('gridOverlay');
            if (grid.classList.contains('active')) {
                const vpt = canvas.viewportTransform;
                grid.style.backgroundSize = `${GRID_SIZE * vpt[0]}px ${GRID_SIZE * vpt[3]}px`;
                grid.style.backgroundPosition = `${vpt[4]}px ${vpt[5]}px`;
            }
        }

        document.getElementById('zoomInBtn').onclick = () => { canvas.setZoom(canvas.getZoom() * 1.2); updateZoomLabel(); updateGrid(); };
        document.getElementById('zoomOutBtn').onclick = () => { canvas.setZoom(canvas.getZoom() / 1.2); updateZoomLabel(); updateGrid(); };
        document.getElementById('fitScreenBtn').onclick = fitToScreen;

        // --- Element Manipulation & Snapping ---
        function setupCanvasEvents() {
            canvas.on('mouse:down', function(opt) {
                if (isPanning) {
                    this.isDragging = true;
                    this.selection = false;
                    this.lastPosX = opt.e.clientX;
                    this.lastPosY = opt.e.clientY;
                } else if (targetSnapMode && opt.target) {
                    targetElement = opt.target;
                    logVerbose("Target element selected for snapping.");
                    document.getElementById('targetSnapBtn').classList.remove('active');
                    targetSnapMode = false;
                } else if (isReplacingArea) {
                    let pointer = canvas.getPointer(opt.e);
                    replaceStartX = pointer.x;
                    replaceStartY = pointer.y;
                    replaceRect = new fabric.Rect({
                        left: replaceStartX, top: replaceStartY, width: 0, height: 0,
                        fill: 'rgba(255, 255, 255, 0.5)', stroke: '#ff0000', strokeDashArray:[5, 5],
                        selectable: false, evented: false
                    });
                    canvas.add(replaceRect);
                }
            });

            canvas.on('mouse:move', function(opt) {
                if (this.isDragging) {
                    var e = opt.e;
                    var vpt = this.viewportTransform;
                    vpt[4] += e.clientX - this.lastPosX;
                    vpt[5] += e.clientY - this.lastPosY;
                    this.requestRenderAll();
                    this.lastPosX = e.clientX;
                    this.lastPosY = e.clientY;
                    updateGrid();
                } else if (isReplacingArea && replaceRect) {
                    let pointer = canvas.getPointer(opt.e);
                    replaceRect.set({
                        width: Math.abs(pointer.x - replaceStartX),
                        height: Math.abs(pointer.y - replaceStartY),
                        left: Math.min(pointer.x, replaceStartX),
                        top: Math.min(pointer.y, replaceStartY)
                    });
                    canvas.renderAll();
                }
            });

            canvas.on('mouse:up', function(opt) {
                this.isDragging = false;
                this.selection = true;

                if (isReplacingArea && replaceRect) {
                    isReplacingArea = false;
                    canvas.defaultCursor = 'default';
                    document.getElementById('replaceAreaBtn').classList.remove('active');
                    
                    if (replaceRect.width < 10 || replaceRect.height < 10) {
                        canvas.remove(replaceRect);
                        logVerbose("Replace area too small, cancelled.", "warn");
                        return;
                    }

                    logVerbose("Area selected. Prompting for new image...");
                    
                    let input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = (e) => {
                        let file = e.target.files[0];
                        let reader = new FileReader();
                        reader.onload = (f) => {
                            fabric.Image.fromURL(f.target.result, (img) => {
                                // Create solid white mask to hide PDF background
                                let mask = new fabric.Rect({
                                    left: replaceRect.left, top: replaceRect.top,
                                    width: replaceRect.width, height: replaceRect.height,
                                    fill: '#ffffff', strokeWidth: 0
                                });
                                
                                // Scale new image to fit the drawn box
                                img.scaleToWidth(replaceRect.width);
                                img.scaleToHeight(replaceRect.height);
                                img.set({ left: replaceRect.left, top: replaceRect.top });
                                
                                // Group them so they move/scale together
                                let group = new fabric.Group([mask, img], {
                                    left: replaceRect.left, top: replaceRect.top
                                });
                                
                                canvas.remove(replaceRect);
                                canvas.add(group);
                                canvas.setActiveObject(group);
                                saveHistory();
                                saveToLocal();
                                logVerbose("Image replaced and grouped with mask successfully.");
                            });
                        };
                        reader.readAsDataURL(file);
                    };
                    
                    window.addEventListener('focus', function handler() {
                        setTimeout(() => {
                            if (replaceRect && canvas.contains(replaceRect)) {
                                canvas.remove(replaceRect);
                                logVerbose("Image replacement cancelled.");
                            }
                        }, 500);
                        window.removeEventListener('focus', handler);
                    });
                    
                    input.click();
                }
            });

            canvas.on('object:moving', function(options) {
                const obj = options.target;
                if (targetElement && targetElement !== obj) {
                    const targetCenter = targetElement.getCenterPoint();
                    const objCenter = obj.getCenterPoint();
                    if (Math.abs(objCenter.x - targetCenter.x) < 20) obj.set({ left: targetCenter.x - (obj.width * obj.scaleX)/2 });
                    if (Math.abs(objCenter.y - targetCenter.y) < 20) obj.set({ top: targetCenter.y - (obj.height * obj.scaleY)/2 });
                } else if (snapEnabled) {
                    obj.set({
                        left: Math.round(obj.left / GRID_SIZE) * GRID_SIZE,
                        top: Math.round(obj.top / GRID_SIZE) * GRID_SIZE
                    });
                }
            });

            canvas.on('selection:created', updatePropertiesPanel);
            canvas.on('selection:updated', updatePropertiesPanel);
            canvas.on('selection:cleared', () => { document.getElementById('textProperties').style.display = 'none'; });

            canvas.on('object:modified', () => { saveHistory(); saveToLocal(); });
            canvas.on('object:added', () => { if(!isHistoryAction) { saveHistory(); saveToLocal(); }});
            canvas.on('object:removed', () => { if(!isHistoryAction) { saveHistory(); saveToLocal(); }});
        }

        // --- UI Event Listeners ---
        function setupEventListeners() {
            document.getElementById('themeToggleBtn').onclick = () => {
                const body = document.body;
                if (body.getAttribute('data-theme') === 'light') body.removeAttribute('data-theme');
                else body.setAttribute('data-theme', 'light');
            };

            document.getElementById('gridToggleBtn').onclick = (e) => {
                const overlay = document.getElementById('gridOverlay');
                overlay.classList.toggle('active');
                e.target.classList.toggle('active');
                updateGrid();
            };

            document.getElementById('snapToggleBtn').onclick = (e) => {
                snapEnabled = !snapEnabled;
                e.target.classList.toggle('active');
            };

            document.getElementById('targetSnapBtn').onclick = (e) => {
                targetSnapMode = !targetSnapMode;
                e.target.classList.toggle('active');
                if(targetSnapMode) logVerbose("Target Snap Mode: Click an element to set it as the snap target.");
            };

            document.getElementById('replaceAreaBtn').onclick = (e) => {
                if(!pdfDoc) return alert("Please open a PDF first.");
                isReplacingArea = !isReplacingArea;
                e.target.classList.toggle('active');
                if(isReplacingArea) {
                    canvas.defaultCursor = 'crosshair';
                    canvas.discardActiveObject();
                    canvas.requestRenderAll();
                    logVerbose("Replace Area Mode: Draw a rectangle over the image you want to replace.");
                } else {
                    canvas.defaultCursor = 'default';
                    if(replaceRect) canvas.remove(replaceRect);
                }
            };

            document.getElementById('addTextBtn').onclick = () => {
                if(!pdfDoc) return alert("Please open a PDF first.");
                const center = canvas.getVpCenter();
                const text = new fabric.IText('Double click to edit', {
                    left: center.x - 80, top: center.y - 10, fontFamily: 'Helvetica', fontSize: 20, fill: '#000000'
                });
                canvas.add(text);
                canvas.setActiveObject(text);
                logVerbose("Added new text element.");
            };

            document.getElementById('imageInput').addEventListener('change', function(e) {
                if(!pdfDoc) return alert("Please open a PDF first.");
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(f) {
                    fabric.Image.fromURL(f.target.result, function(img) {
                        const center = canvas.getVpCenter();
                        img.scaleToWidth(200);
                        img.set({ left: center.x - 100, top: center.y - (img.getScaledHeight()/2) });
                        canvas.add(img);
                        canvas.setActiveObject(img);
                        logVerbose("Added new image element.");
                    });
                };
                reader.readAsDataURL(file);
                e.target.value = ''; 
            });

            document.getElementById('alignCenterH').onclick = () => { const obj = canvas.getActiveObject(); if(obj) { obj.centerH(); obj.setCoords(); canvas.renderAll(); saveHistory(); saveToLocal(); }};
            document.getElementById('alignCenterV').onclick = () => { const obj = canvas.getActiveObject(); if(obj) { obj.centerV(); obj.setCoords(); canvas.renderAll(); saveHistory(); saveToLocal(); }};

            document.getElementById('bringFrontBtn').onclick = () => { const obj = canvas.getActiveObject(); if(obj) { canvas.bringToFront(obj); saveHistory(); saveToLocal(); }};
            document.getElementById('bringForwardBtn').onclick = () => { const obj = canvas.getActiveObject(); if(obj) { canvas.bringForward(obj); saveHistory(); saveToLocal(); }};
            document.getElementById('sendBackwardBtn').onclick = () => { const obj = canvas.getActiveObject(); if(obj) { canvas.sendBackwards(obj); saveHistory(); saveToLocal(); }};
            document.getElementById('sendBackBtn').onclick = () => { const obj = canvas.getActiveObject(); if(obj) { canvas.sendToBack(obj); saveHistory(); saveToLocal(); }};

            document.getElementById('lockBtn').onclick = () => {
                const obj = canvas.getActiveObject();
                if(obj) {
                    obj.lockMovementX = !obj.lockMovementX;
                    obj.lockMovementY = !obj.lockMovementY;
                    obj.lockRotation = !obj.lockRotation;
                    obj.lockScalingX = !obj.lockScalingX;
                    obj.lockScalingY = !obj.lockScalingY;
                    obj.hasControls = !obj.lockMovementX;
                    canvas.renderAll();
                    logVerbose(`Element ${obj.lockMovementX ? 'locked' : 'unlocked'}.`);
                }
            };
            document.getElementById('deleteBtn').onclick = deleteSelected;

            document.getElementById('fontFamily').onchange = (e) => updateTextProp('fontFamily', e.target.value);
            document.getElementById('fontSize').onchange = (e) => updateTextProp('fontSize', parseInt(e.target.value));
            document.getElementById('textColor').onchange = (e) => updateTextProp('fill', e.target.value);
            document.getElementById('textAlignLeft').onclick = () => updateTextProp('textAlign', 'left');
            document.getElementById('textAlignCenter').onclick = () => updateTextProp('textAlign', 'center');
            document.getElementById('textAlignRight').onclick = () => updateTextProp('textAlign', 'right');
            document.getElementById('textAlignJustify').onclick = () => updateTextProp('textAlign', 'justify');

            document.getElementById('undoBtn').onclick = undo;
            document.getElementById('redoBtn').onclick = redo;
            document.getElementById('exportBtn').onclick = exportPDF;
        }

        function updatePropertiesPanel() {
            const obj = canvas.getActiveObject();
            if (!obj) {
                document.getElementById('textProperties').style.display = 'none';
                return;
            }
            if (obj.type === 'i-text' || obj.type === 'text') {
                document.getElementById('textProperties').style.display = 'block';
                document.getElementById('fontFamily').value = obj.fontFamily || 'Helvetica';
                document.getElementById('fontSize').value = obj.fontSize || 16;
                document.getElementById('textColor').value = obj.fill || '#000000';
            } else {
                document.getElementById('textProperties').style.display = 'none';
            }
        }

        function updateTextProp(prop, value) {
            const obj = canvas.getActiveObject();
            if (obj && (obj.type === 'i-text' || obj.type === 'text')) {
                obj.set(prop, value);
                canvas.renderAll();
                saveHistory();
                saveToLocal();
            }
        }

        function deleteSelected() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(function(object) {
                    canvas.remove(object);
                });
                logVerbose(`Deleted ${activeObjects.length} element(s).`);
                saveHistory();
                saveToLocal();
            }
        }

        // --- Keyboard Shortcuts ---
        function setupKeyboardShortcuts() {
            window.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || canvas.getActiveObject()?.isEditing) return;

                const obj = canvas.getActiveObject();
                const step = e.shiftKey ? 10 : 1;

                if (e.key === 'Delete' || e.key === 'Backspace') {
                    deleteSelected();
                    e.preventDefault();
                } else if (e.key === 'Escape') {
                    canvas.discardActiveObject();
                    canvas.renderAll();
                    if(isReplacingArea) {
                        isReplacingArea = false;
                        canvas.defaultCursor = 'default';
                        document.getElementById('replaceAreaBtn').classList.remove('active');
                        if(replaceRect) canvas.remove(replaceRect);
                    }
                } else if (e.ctrlKey && e.key === 'c') {
                    if(obj) obj.clone((cloned) => { window.clipboard = cloned; logVerbose("Element copied."); });
                } else if (e.ctrlKey && e.key === 'v') {
                    if(window.clipboard) {
                        window.clipboard.clone((clonedObj) => {
                            canvas.discardActiveObject();
                            clonedObj.set({ left: clonedObj.left + 10, top: clonedObj.top + 10, evented: true });
                            if (clonedObj.type === 'activeSelection') {
                                clonedObj.canvas = canvas;
                                clonedObj.forEachObject((o) => canvas.add(o));
                                clonedObj.setCoords();
                            } else {
                                canvas.add(clonedObj);
                            }
                            window.clipboard.top += 10; window.clipboard.left += 10;
                            canvas.setActiveObject(clonedObj);
                            canvas.requestRenderAll();
                            logVerbose("Element pasted.");
                            saveHistory();
                            saveToLocal();
                        });
                    }
                } else if (e.ctrlKey && e.key === 'z') {
                    undo();
                } else if (e.ctrlKey && e.key === 'y') {
                    redo();
                } else if (obj &&['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    if (e.key === 'ArrowUp') obj.top -= step;
                    if (e.key === 'ArrowDown') obj.top += step;
                    if (e.key === 'ArrowLeft') obj.left -= step;
                    if (e.key === 'ArrowRight') obj.left += step;
                    
                    if(snapEnabled) {
                        obj.left = Math.round(obj.left / GRID_SIZE) * GRID_SIZE;
                        obj.top = Math.round(obj.top / GRID_SIZE) * GRID_SIZE;
                    }
                    obj.setCoords();
                    canvas.renderAll();
                    saveHistory();
                    saveToLocal();
                }
            });
        }

        // --- Undo / Redo Stack (Per Page) ---
        function getCanvasState() {
            const json = canvas.toJSON();
            delete json.backgroundImage; 
            return json;
        }

        function saveHistory() {
            if (isHistoryAction || !pdfDoc) return;
            if (!pageHistories[currentPageNum]) {
                pageHistories[currentPageNum] = { history:[], index: -1 };
            }
            const ph = pageHistories[currentPageNum];
            const json = getCanvasState();
            ph.history = ph.history.slice(0, ph.index + 1);
            ph.history.push(json);
            ph.index++;
        }

        function loadState(state) {
            const bgImage = canvas.backgroundImage; 
            canvas.loadFromJSON(state, () => {
                canvas.setBackgroundImage(bgImage, () => {
                    canvas.renderAll();
                    isHistoryAction = false;
                    saveToLocal();
                });
            });
        }

        function undo() {
            const ph = pageHistories[currentPageNum];
            if (ph && ph.index > 0) {
                isHistoryAction = true;
                ph.index--;
                loadState(ph.history[ph.index]);
                logVerbose("Undo performed.");
            }
        }

        function redo() {
            const ph = pageHistories[currentPageNum];
            if (ph && ph.index < ph.history.length - 1) {
                isHistoryAction = true;
                ph.index++;
                loadState(ph.history[ph.index]);
                logVerbose("Redo performed.");
            }
        }

        // --- Local Auto-Save ---
        function saveToLocal() {
            if(pdfDoc) {
                try {
                    pageCanvases[currentPageNum] = getCanvasState();
                    localStorage.setItem('pdf_editor_draft', JSON.stringify(pageCanvases));
                } catch (e) {
                    logVerbose("Failed to save draft to localStorage (Quota exceeded?).", "warn");
                }
            }
        }

        function loadAutoSave() {
            const draft = localStorage.getItem('pdf_editor_draft');
            if (draft) {
                try {
                    pageCanvases = JSON.parse(draft);
                    logVerbose("Draft loaded from localStorage. Upload the original PDF to apply.");
                } catch (e) {
                    console.error("Failed to parse draft", e);
                }
            }
        }

        // --- Export PDF (pdf-lib) ---
        async function exportPDF() {
            if (!pdfBytesOriginal) return;
            
            showLoading(true, "Exporting PDF...");
            document.getElementById('exportBtn').innerText = "Exporting...";
            
            try {
                logVerbose("Saving current page state...");
                pageCanvases[currentPageNum] = getCanvasState();

                logVerbose("Loading original PDF vector data into pdf-lib...");
                const pdfDocLib = await PDFLib.PDFDocument.load(pdfBytesOriginal);
                const pages = pdfDocLib.getPages();

                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    const pageData = pageCanvases[i];
                    if (!pageData || pageData.objects.length === 0) continue;

                    logVerbose(`Processing edits for Page ${i}...`);
                    const pdfPage = pages[i - 1];
                    const { width, height } = pdfPage.getSize();
                    
                    // Create a temporary canvas to parse JSON and ungroup elements for absolute coordinates
                    const tempCanvas = new fabric.StaticCanvas(null, { width: width, height: height });
                    await new Promise(resolve => tempCanvas.loadFromJSON(pageData, resolve));
                    
                    // Ungroup all groups to get absolute coordinates for export (Crucial for Replace Image tool)
                    const objects = tempCanvas.getObjects();
                    let flatObjects =[];
                    
                    objects.forEach(obj => {
                        if (obj.type === 'group') {
                            const groupObjects = obj.getObjects();
                            const groupMatrix = obj.calcTransformMatrix();
                            groupObjects.forEach(gObj => {
                                // Calculate absolute position of grouped object
                                const matrix = fabric.util.multiplyTransformMatrices(groupMatrix, gObj.calcTransformMatrix());
                                const options = fabric.util.qrDecompose(matrix);
                                const absObj = fabric.util.object.clone(gObj);
                                absObj.set({
                                    left: options.translateX, top: options.translateY,
                                    scaleX: options.scaleX, scaleY: options.scaleY,
                                    angle: options.angle
                                });
                                flatObjects.push(absObj);
                            });
                        } else {
                            flatObjects.push(obj);
                        }
                    });

                    for (const obj of flatObjects) {
                        // PDF-lib uses bottom-left origin, Fabric uses top-left
                        const yPos = height - obj.top - (obj.height * obj.scaleY);

                        if (obj.type === 'rect') {
                            const rgb = hexToRgb(obj.fill || '#ffffff');
                            pdfPage.drawRectangle({
                                x: obj.left,
                                y: yPos,
                                width: obj.width * obj.scaleX,
                                height: obj.height * obj.scaleY,
                                color: PDFLib.rgb(rgb.r/255, rgb.g/255, rgb.b/255)
                            });
                        } else if (obj.type === 'i-text' || obj.type === 'text') {
                            let font;
                            if(obj.fontFamily === 'Times New Roman') font = await pdfDocLib.embedFont(PDFLib.StandardFonts.TimesRoman);
                            else if(obj.fontFamily === 'Courier') font = await pdfDocLib.embedFont(PDFLib.StandardFonts.Courier);
                            else font = await pdfDocLib.embedFont(PDFLib.StandardFonts.Helvetica);

                            const rgb = hexToRgb(obj.fill || '#000000');
                            const lines = obj.textLines || obj.text.split('\n');
                            const lineHeight = obj.fontSize * obj.lineHeight;
                            
                            lines.forEach((line, index) => {
                                let lineWidth = font.widthOfTextAtSize(line, obj.fontSize);
                                let offsetX = 0;
                                if (obj.textAlign === 'center') offsetX = (obj.width - lineWidth) / 2;
                                else if (obj.textAlign === 'right') offsetX = obj.width - lineWidth;
                                
                                pdfPage.drawText(line, {
                                    x: obj.left + offsetX,
                                    y: height - obj.top - obj.fontSize - (index * lineHeight),
                                    size: obj.fontSize,
                                    font: font,
                                    color: PDFLib.rgb(rgb.r/255, rgb.g/255, rgb.b/255)
                                });
                            });
                        } else if (obj.type === 'image') {
                            const imgData = obj.getSrc();
                            let embeddedImage;
                            if (imgData.includes('image/png')) embeddedImage = await pdfDocLib.embedPng(imgData);
                            else if (imgData.includes('image/jpeg')) embeddedImage = await pdfDocLib.embedJpg(imgData);
                            
                            if (embeddedImage) {
                                pdfPage.drawImage(embeddedImage, {
                                    x: obj.left,
                                    y: yPos,
                                    width: obj.width * obj.scaleX,
                                    height: obj.height * obj.scaleY
                                });
                            }
                        }
                    }
                }

                logVerbose("Compiling final PDF bytes...");
                const pdfBytes = await pdfDocLib.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'edited_document.pdf';
                link.click();
                logVerbose("Export successful!");

            } catch (error) {
                logVerbose(`Export failed: ${error.message}`, "error");
                alert("An error occurred during export. Check logs.");
            } finally {
                document.getElementById('exportBtn').innerHTML = '<i class="fas fa-download"></i> Export';
                setTimeout(() => showLoading(false), 1500); // Keep logs visible briefly
            }
        }

        function hexToRgb(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        // Run init
        init();
    </script>
