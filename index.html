<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced PDF Editor Pro</title>
    
    <!-- Libraries (Using highly stable 2.16.105 for PDF.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
      (function ensurePdfjsReady(){
        const lib = window.pdfjsLib;
        if (!lib) { return setTimeout(ensurePdfjsReady, 30); }
        lib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
      })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #121212; --panel-bg: #1e1e1e; --toolbar-bg: #000000;
            --text-color: #ffffff; --border-color: #333333; --accent-color: #3b82f6;
            --accent-text: #ffffff; --hover-bg: #2a2a2a; --canvas-bg: #0b0e14;
        }

        [data-theme="light"] {
            --bg-color: #f5f5f5; --panel-bg: #ffffff; --toolbar-bg: #e0e0e0;
            --text-color: #000000; --border-color: #cccccc; --accent-color: #3b82f6;
            --accent-text: #ffffff; --hover-bg: #e8e8e8; --canvas-bg: #d0d0d0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Toolbar */
        .toolbar { background-color: var(--toolbar-bg); padding: 10px 20px; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; z-index: 100; }
        .toolbar-group { display: flex; gap: 5px; border-right: 1px solid var(--border-color); padding-right: 15px; align-items: center; }
        .toolbar-group:last-child { border-right: none; }
        
        button, label.btn { background: transparent; color: var(--text-color); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        button:hover, label.btn:hover { background: var(--hover-bg); border-color: var(--accent-color); }
        button.active { background: var(--accent-color); color: var(--accent-text); border-color: var(--accent-color); font-weight: bold; }
        button.danger:hover { background: #ef4444; border-color: #ef4444; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        input[type="file"] { display: none; }

        /* Main Layout */
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* Sidebars */
        .sidebar { width: 250px; background-color: var(--panel-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow-y: auto; z-index: 10; }
        .sidebar-right { border-right: none; border-left: 1px solid var(--border-color); padding: 15px; width: 280px; }
        
        .panel-section { margin-bottom: 20px; }
        .panel-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; color: #888; font-weight: 700; }
        .prop-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .prop-row label { font-size: 12px; width: 60px; }
        select, input[type="number"], input[type="color"] { width: 100%; padding: 6px; background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px; }
        
        /* Thumbnails */
        .thumbnail { margin: 10px; border: 2px solid transparent; cursor: pointer; position: relative; transition: 0.2s; background: #fff; border-radius: 4px; overflow: hidden; }
        .thumbnail:hover { border-color: #888; }
        .thumbnail.active { border-color: var(--accent-color); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); }
        .thumbnail canvas { width: 100%; display: block; }
        .thumbnail-label { text-align: center; font-size: 11px; padding: 6px; background: var(--panel-bg); color: var(--text-color); border-top: 1px solid var(--border-color); }

        /* Canvas Architecture */
        .canvas-wrapper { flex: 1; background-color: var(--canvas-bg); overflow: auto; padding: 40px; position: relative; }
        #canvasContainer { position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: white; margin: 0 auto; }
        
        /* Grid Overlay */
        .grid-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; background-image: linear-gradient(to right, rgba(128,128,128,0.3) 1px, transparent 1px), linear-gradient(to bottom, rgba(128,128,128,0.3) 1px, transparent 1px); display: none; z-index: 5; }
        .grid-overlay.active { display: block; }

        .icon-btn-group { display: flex; gap: 4px; }
        .icon-btn-group button { padding: 6px 8px; flex: 1; justify-content: center; }

        /* Loading Overlay & Floating Logs */
        #loadingOverlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); color: white; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; gap: 15px; backdrop-filter: blur(4px); }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #floatingLogs { display: none; position: absolute; bottom: 20px; right: 20px; width: 450px; height: 300px; background: rgba(11, 14, 20, 0.95); color: #10b981; font-family: ui-monospace, monospace; font-size: 11px; padding: 15px; overflow-y: auto; border-radius: 8px; z-index: 9999; border: 1px solid #2a2f3e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex-direction: column; }
        .log-header { display: flex; justify-content: space-between; border-bottom: 1px solid #2a2f3e; padding-bottom: 8px; margin-bottom: 8px; color: #fff; font-weight: bold; }
        .log-info { color: #10b981; margin-bottom: 4px; }
        .log-warn { color: #f59e0b; margin-bottom: 4px; }
        .log-error { color: #ef4444; margin-bottom: 4px; }
    </style>
</head>
<body>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-group">
            <label class="btn primary"><i class="fas fa-folder-open"></i> Open PDF<input type="file" id="fileInput" accept="application/pdf"></label>
            <button id="exportBtn" disabled><i class="fas fa-download"></i> Export</button>
        </div>
        
        <!-- SUPERIOR FEATURE: Explicit Tool Modes -->
        <div class="toolbar-group" id="toolModes">
            <button class="tool-btn active" data-mode="select" title="Select & Move"><i class="fas fa-mouse-pointer"></i></button>
            <button class="tool-btn" data-mode="cut" title="Cut & Move Element (Draw Box)"><i class="fas fa-cut"></i> Cut Element</button>
            <button class="tool-btn" data-mode="edit-text" title="Edit Existing Text"><i class="fas fa-pen"></i> Edit Text</button>
            <button class="tool-btn" data-mode="replace-image" title="Replace Area with Image"><i class="fas fa-image"></i> Replace Area</button>
        </div>

        <div class="toolbar-group">
            <button id="addTextBtn"><i class="fas fa-font"></i> Add Text</button>
            <label class="btn"><i class="fas fa-plus-square"></i> Add Image<input type="file" id="imageInput" accept="image/*"></label>
        </div>

        <div class="toolbar-group">
            <button id="undoBtn" title="Undo (Ctrl+Z)"><i class="fas fa-undo"></i></button>
            <button id="redoBtn" title="Redo (Ctrl+Y)"><i class="fas fa-redo"></i></button>
            <button id="deleteToolbarBtn" class="danger" title="Delete Selected (Del)"><i class="fas fa-trash"></i></button>
        </div>

        <div class="toolbar-group">
            <button id="zoomOutBtn"><i class="fas fa-search-minus"></i></button>
            <span id="zoomLevel" style="font-size: 13px; width: 45px; text-align: center; font-weight: bold;">100%</span>
            <button id="zoomInBtn"><i class="fas fa-search-plus"></i></button>
            <button id="fitScreenBtn"><i class="fas fa-expand"></i> Fit</button>
        </div>

        <div class="toolbar-group">
            <button id="gridToggleBtn" title="Toggle Grid"><i class="fas fa-border-all"></i> Grid</button>
            <button id="snapToggleBtn" class="active" title="Snap to Grid/Elements"><i class="fas fa-magnet"></i> Snap</button>
            <button id="targetSnapBtn" title="Target Snap Mode"><i class="fas fa-crosshairs"></i> Target Snap</button>
        </div>

        <div class="toolbar-group" style="margin-left: auto;">
            <button id="toggleLogsBtn" title="Toggle System Logs"><i class="fas fa-terminal"></i> Logs</button>
            <button id="themeToggleBtn"><i class="fas fa-adjust"></i> Theme</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <!-- Loading Overlay -->
        <div id="loadingOverlay">
            <div class="spinner"></div>
            <div id="loadingText" style="font-size: 18px; font-weight: 600; letter-spacing: 1px;">Processing...</div>
        </div>

        <!-- Floating Logs CLI -->
        <div id="floatingLogs">
            <div class="log-header">
                <span>System Logs</span>
                <button onclick="document.getElementById('logContent').innerHTML=''" style="background:transparent; border:none; color:#888; cursor:pointer; font-size:11px;">Clear</button>
            </div>
            <div id="logContent"></div>
        </div>

        <!-- Left Sidebar (Pages) -->
        <div class="sidebar" id="thumbnailsContainer">
            <div style="padding: 20px; text-align: center; color: #888; font-size: 13px;">Upload a PDF to begin</div>
        </div>

        <!-- Canvas Area (Native Scrollbars) -->
        <div class="canvas-wrapper" id="canvasWrapper">
            <div id="canvasContainer">
                <div class="grid-overlay" id="gridOverlay"></div>
                <canvas id="pdfCanvas"></canvas>
            </div>
        </div>

        <!-- Right Sidebar (Properties) -->
        <div class="sidebar sidebar-right">
            <div class="panel-section">
                <h3>Alignment</h3>
                <div class="icon-btn-group">
                    <button id="alignCenterH" title="Center Horizontally"><i class="fas fa-arrows-alt-h"></i></button>
                    <button id="alignCenterV" title="Center Vertically"><i class="fas fa-arrows-alt-v"></i></button>
                </div>
            </div>

            <div class="panel-section">
                <h3>Arrange (Z-Index)</h3>
                <div class="icon-btn-group">
                    <button id="bringFrontBtn" title="Bring to Front"><i class="fas fa-angle-double-up"></i></button>
                    <button id="bringForwardBtn" title="Bring Forward"><i class="fas fa-angle-up"></i></button>
                    <button id="sendBackwardBtn" title="Send Backward"><i class="fas fa-angle-down"></i></button>
                    <button id="sendBackBtn" title="Send to Back"><i class="fas fa-angle-double-down"></i></button>
                </div>
            </div>

            <div class="panel-section" id="textProperties" style="display: none;">
                <h3>Text Formatting</h3>
                <div class="prop-row">
                    <select id="fontFamily">
                        <option value="Helvetica">Helvetica</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Courier">Courier</option>
                        <option value="Arial">Arial</option>
                    </select>
                </div>
                <div class="prop-row">
                    <label>Size</label>
                    <input type="number" id="fontSize" value="16" min="1">
                </div>
                <div class="prop-row">
                    <label>Color</label>
                    <input type="color" id="textColor" value="#000000">
                </div>
                <div class="icon-btn-group" style="margin-top: 10px;">
                    <button id="textAlignLeft"><i class="fas fa-align-left"></i></button>
                    <button id="textAlignCenter"><i class="fas fa-align-center"></i></button>
                    <button id="textAlignRight"><i class="fas fa-align-right"></i></button>
                    <button id="textAlignJustify"><i class="fas fa-align-justify"></i></button>
                </div>
            </div>

            <div class="panel-section">
                <h3>Element</h3>
                <button id="lockBtn" style="width: 100%; justify-content: center;"><i class="fas fa-lock"></i> Lock/Unlock</button>
                <button id="deleteBtn" class="danger" style="width: 100%; justify-content: center; margin-top: 5px;"><i class="fas fa-trash"></i> Delete</button>
            </div>
        </div>
    </div>

    <script>
        // --- Verbose Logging System ---
        function logVerbose(msg, type = 'info') {
            const logContent = document.getElementById('logContent');
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            entry.className = `log-${type}`;
            entry.innerText = `[${time}] ${msg}`;
            logContent.appendChild(entry);
            logContent.parentElement.scrollTop = logContent.parentElement.scrollHeight;
            
            if (type === 'error') console.error(msg);
            else if (type === 'warn') console.warn(msg);
            else console.log(msg);
        }

        let loadingTimeout;
        function showLoading(show, text = "Processing...") {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').innerText = text;
            
            if (show) {
                overlay.style.display = 'flex';
                logVerbose(`--- ${text} ---`);
                clearTimeout(loadingTimeout);
                loadingTimeout = setTimeout(() => {
                    if (overlay.style.display === 'flex') {
                        logVerbose("Loading timeout reached. Forcing overlay to close.", "warn");
                        overlay.style.display = 'none';
                    }
                }, 15000);
            } else {
                clearTimeout(loadingTimeout);
                overlay.style.display = 'none';
            }
        }

        // --- Configuration & State ---
        let pdfDoc = null;
        let currentPageNum = 1;
        let canvas;
        let pdfBytesOriginal = null;
        
        let pageCanvases = {}; 
        let pageHistories = {}; 
        let isHistoryAction = false;

        let currentPdfPageWidth = 0;
        let currentPdfPageHeight = 0;
        let currentZoom = 1;
        let bgCanvasElement = null; 
        let renderScale = 2.0;

        // Tool Modes
        let currentMode = 'select'; // 'select', 'cut', 'edit-text', 'replace-image'
        let actionRect = null;
        let startX = 0, startY = 0;
        let extractedTextItems = []; 
        let textHighlightRects =[]; 

        let snapEnabled = true;
        let targetSnapMode = false;
        let targetElement = null;
        const GRID_SIZE = 20;

        const wrapper = document.getElementById('canvasWrapper');
        const container = document.getElementById('canvasContainer');

        // --- Initialization ---
        function init() {
            try {
                logVerbose("Initializing Fabric.js canvas...");
                canvas = new fabric.Canvas('pdfCanvas', {
                    preserveObjectStacking: true,
                    selection: true
                });

                setupEventListeners();
                setupKeyboardShortcuts();
                setupCanvasEvents();
                setupNativePanning();
                loadAutoSave();
                logVerbose("Initialization complete. Ready for PDF upload.");
            } catch (e) {
                logVerbose(`Initialization failed: ${e.message}`, "error");
            }
        }

        // --- PDF Loading & Rendering ---
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            showLoading(true, "Loading PDF...");
            try {
                logVerbose(`Reading file: ${file.name} (${file.size} bytes)`);
                const arrayBuffer = await file.arrayBuffer();
                pdfBytesOriginal = arrayBuffer;
                
                logVerbose("Parsing PDF structure with pdf.js...");
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                logVerbose(`PDF loaded successfully. Pages: ${pdfDoc.numPages}`);
                
                document.getElementById('exportBtn').disabled = false;
                document.getElementById('thumbnailsContainer').innerHTML = '';
                
                pageCanvases = {};
                pageHistories = {};

                await loadPage(1);
                renderThumbnails(); 
            } catch (error) {
                logVerbose(`Failed to load PDF: ${error.message}`, "error");
                alert("Failed to load PDF. Check logs.");
                showLoading(false);
            }
        });

        async function renderThumbnails() {
            logVerbose("Generating sidebar thumbnails in background...");
            const thumbContainer = document.getElementById('thumbnailsContainer');
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                try {
                    const page = await pdfDoc.getPage(i);
                    const viewport = page.getViewport({ scale: 0.2 });
                    
                    const thumbWrapper = document.createElement('div');
                    thumbWrapper.className = 'thumbnail';
                    thumbWrapper.id = `thumb-${i}`;
                    if (i === currentPageNum) thumbWrapper.classList.add('active');
                    thumbWrapper.onclick = () => loadPage(i);

                    const thumbCanvas = document.createElement('canvas');
                    thumbCanvas.width = viewport.width;
                    thumbCanvas.height = viewport.height;
                    const ctx = thumbCanvas.getContext('2d');

                    const renderTask = page.render({ canvasContext: ctx, viewport: viewport });
                    
                    Promise.race([
                        renderTask.promise,
                        new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 3000))
                    ]).then(() => {
                        const label = document.createElement('div');
                        label.className = 'thumbnail-label';
                        label.innerText = `Page ${i}`;
                        thumbWrapper.appendChild(thumbCanvas);
                        thumbWrapper.appendChild(label);
                        thumbContainer.appendChild(thumbWrapper);
                    }).catch(err => logVerbose(`Thumbnail warning for page ${i}: ${err.message}`, "warn"));
                } catch (err) {
                    logVerbose(`Error setting up thumbnail for page ${i}: ${err.message}`, "warn");
                }
            }
        }

        async function loadPage(pageNum) {
            showLoading(true, `Loading Page ${pageNum}...`);
            try {
                if (pdfDoc && canvas.getObjects().length > 0) {
                    pageCanvases[currentPageNum] = getCanvasState();
                }

                currentPageNum = pageNum;
                setMode('select'); // Reset mode
                
                document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                const activeThumb = document.getElementById(`thumb-${pageNum}`);
                if(activeThumb) activeThumb.classList.add('active');

                logVerbose(`Fetching page ${pageNum} data...`);
                const page = await pdfDoc.getPage(pageNum);
                
                const unscaledViewport = page.getViewport({ scale: 1.0 });
                currentPdfPageWidth = unscaledViewport.width;
                currentPdfPageHeight = unscaledViewport.height;

                renderScale = 2.0; 
                if (currentPdfPageWidth * renderScale > 4000 || currentPdfPageHeight * renderScale > 4000) {
                    renderScale = Math.min(4000 / currentPdfPageWidth, 4000 / currentPdfPageHeight);
                }

                const renderViewport = page.getViewport({ scale: renderScale });
                bgCanvasElement = document.createElement('canvas');
                bgCanvasElement.width = renderViewport.width;
                bgCanvasElement.height = renderViewport.height;
                const ctx = bgCanvasElement.getContext('2d');

                logVerbose(`Rendering PDF background (${bgCanvasElement.width}x${bgCanvasElement.height})...`);
                const renderTask = page.render({ canvasContext: ctx, viewport: renderViewport });
                
                try {
                    await Promise.race([
                        renderTask.promise,
                        new Promise((_, reject) => setTimeout(() => reject(new Error("PDF.js render timeout")), 8000))
                    ]);
                } catch (e) {
                    logVerbose(`Render warning: ${e.message}. Proceeding with partial buffer.`, "warn");
                }

                // Extract Text Data for the "Edit Text" Tool
                logVerbose("Extracting text layer data...");
                const textContent = await page.getTextContent();
                extractedTextItems = textContent.items.map(item => {
                    const tx = item.transform;
                    const fontSize = Math.hypot(tx[0], tx[1]);
                    return {
                        str: item.str,
                        left: tx[4],
                        top: currentPdfPageHeight - tx[5] - fontSize, // Convert PDF bottom-left to Fabric top-left
                        width: item.width,
                        height: fontSize,
                        fontSize: fontSize,
                        fontFamily: item.fontName
                    };
                }).filter(item => item.str.trim().length > 0);

                // Setup Fabric Canvas
                canvas.clear();
                canvas.setWidth(currentPdfPageWidth);
                canvas.setHeight(currentPdfPageHeight);

                const bgImage = new fabric.Image(bgCanvasElement);
                bgImage.scale(1 / renderScale);

                await new Promise((resolve) => {
                    canvas.setBackgroundImage(bgImage, () => {
                        logVerbose("Background applied successfully.");
                        resolve();
                    });
                });

                if (pageCanvases[pageNum]) {
                    logVerbose("Restoring previous edits for this page...");
                    await new Promise((resolve) => {
                        canvas.loadFromJSON(pageCanvases[pageNum], () => {
                            canvas.setBackgroundImage(bgImage, () => {
                                canvas.renderAll();
                                resolve();
                            });
                        });
                    });
                } else {
                    canvas.renderAll();
                    saveHistory(); // Save initial blank state
                }

                fitToScreen();

            } catch (error) {
                logVerbose(`Error loading page ${pageNum}: ${error.message}`, "error");
            } finally {
                showLoading(false);
            }
        }

        // --- Superior Canvas Navigation ---
        function updateContainerCentering() {
            container.style.margin = '0';
            const wrapperWidth = wrapper.clientWidth;
            const wrapperHeight = wrapper.clientHeight;
            const containerWidth = container.offsetWidth;
            const containerHeight = container.offsetHeight;
            
            let marginTop = 0;
            let marginLeft = 0;
            
            if (containerWidth < wrapperWidth) marginLeft = (wrapperWidth - containerWidth) / 2;
            if (containerHeight < wrapperHeight) marginTop = (wrapperHeight - containerHeight) / 2;
            
            container.style.marginLeft = marginLeft + 'px';
            container.style.marginTop = marginTop + 'px';
        }

        function setZoom(zoom) {
            currentZoom = zoom;
            canvas.setZoom(zoom);
            
            const newWidth = currentPdfPageWidth * zoom;
            const newHeight = currentPdfPageHeight * zoom;
            canvas.setWidth(newWidth);
            canvas.setHeight(newHeight);
            
            container.style.width = newWidth + 'px';
            container.style.height = newHeight + 'px';
            
            document.getElementById('zoomLevel').innerText = Math.round(zoom * 100) + '%';
            updateGrid();
            updateContainerCentering();
        }

        function fitToScreen() {
            if (!currentPdfPageWidth || !currentPdfPageHeight) return;
            const padding = 60;
            const cw = wrapper.clientWidth - padding;
            const ch = wrapper.clientHeight - padding;
            if (cw <= 0 || ch <= 0) return; 
            
            const scaleX = cw / currentPdfPageWidth;
            const scaleY = ch / currentPdfPageHeight;
            let zoom = Math.min(scaleX, scaleY);
            if (zoom > 3) zoom = 3;
            if (zoom < 0.1) zoom = 0.1;
            
            setZoom(zoom);
        }

        document.getElementById('zoomInBtn').onclick = () => setZoom(currentZoom * 1.2);
        document.getElementById('zoomOutBtn').onclick = () => setZoom(currentZoom / 1.2);
        document.getElementById('fitScreenBtn').onclick = fitToScreen;
        window.addEventListener('resize', () => { if (pdfDoc) updateContainerCentering(); });

        // --- Native Spacebar Panning ---
        let isSpaceDown = false;
        let isNativePanning = false;
        let panStartX, panStartY, scrollLeft, scrollTop;

        function setupNativePanning() {
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && e.target === document.body) {
                    e.preventDefault();
                    if (!isSpaceDown) {
                        isSpaceDown = true;
                        wrapper.style.cursor = 'grab';
                        canvas.selection = false;
                        canvas.forEachObject(o => o.evented = false);
                    }
                }
            });

            window.addEventListener('keyup', (e) => {
                if (e.code === 'Space') {
                    isSpaceDown = false;
                    wrapper.style.cursor = 'default';
                    if (currentMode === 'select') {
                        canvas.selection = true;
                        canvas.forEachObject(o => o.evented = true);
                    }
                }
            });

            wrapper.addEventListener('mousedown', (e) => {
                if (isSpaceDown) {
                    isNativePanning = true;
                    panStartX = e.pageX - wrapper.offsetLeft;
                    panStartY = e.pageY - wrapper.offsetTop;
                    scrollLeft = wrapper.scrollLeft;
                    scrollTop = wrapper.scrollTop;
                    wrapper.style.cursor = 'grabbing';
                }
            });

            wrapper.addEventListener('mousemove', (e) => {
                if (!isNativePanning) return;
                e.preventDefault();
                const x = e.pageX - wrapper.offsetLeft;
                const y = e.pageY - wrapper.offsetTop;
                wrapper.scrollLeft = scrollLeft - (x - panStartX);
                wrapper.scrollTop = scrollTop - (y - panStartY);
            });

            window.addEventListener('mouseup', () => {
                isNativePanning = false;
                if (isSpaceDown) wrapper.style.cursor = 'grab';
            });
        }

        // --- Tool Modes & Canvas Events ---
        function setMode(mode) {
            if (!pdfDoc) return;
            currentMode = mode;
            
            // Update UI
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.querySelector(`.tool-btn[data-mode="${mode}"]`);
            if (activeBtn) activeBtn.classList.add('active');

            // Cleanup previous mode artifacts
            if (actionRect) { canvas.remove(actionRect); actionRect = null; }
            textHighlightRects.forEach(r => canvas.remove(r));
            textHighlightRects =[];

            if (mode === 'select') {
                canvas.defaultCursor = 'default';
                canvas.selection = true;
                canvas.forEachObject(o => o.evented = true);
                logVerbose("Mode: Select & Move");
            } else if (mode === 'cut' || mode === 'replace-image') {
                canvas.defaultCursor = 'crosshair';
                canvas.discardActiveObject();
                canvas.selection = false;
                canvas.forEachObject(o => o.evented = false);
                logVerbose(`Mode: ${mode === 'cut' ? 'Cut Element' : 'Replace Area'}. Draw a box on the canvas.`);
            } else if (mode === 'edit-text') {
                canvas.defaultCursor = 'default';
                canvas.discardActiveObject();
                canvas.selection = false;
                canvas.forEachObject(o => o.evented = false);
                logVerbose("Mode: Edit Text. Click a highlighted text box to edit it.");
                
                // Draw highlights over extracted text
                extractedTextItems.forEach(item => {
                    const rect = new fabric.Rect({
                        left: item.left, top: item.top, width: item.width, height: item.height * 1.2,
                        fill: 'rgba(59, 130, 246, 0.2)', stroke: '#3b82f6', strokeWidth: 1,
                        selectable: false, evented: true, hoverCursor: 'pointer'
                    });
                    
                    rect.on('mousedown', function() {
                        // 1. Create White Eraser
                        const eraser = new fabric.Rect({
                            left: item.left, top: item.top, width: item.width, height: item.height * 1.2,
                            fill: '#ffffff', selectable: false, evented: false, isEraser: true
                        });
                        canvas.add(eraser);
                        eraser.sendToBack();

                        // 2. Create Editable Text
                        const textObj = new fabric.IText(item.str, {
                            left: item.left, top: item.top, fontSize: item.fontSize,
                            fontFamily: 'Helvetica', fill: '#000000'
                        });
                        canvas.add(textObj);
                        
                        // 3. Switch back to select mode and activate text
                        setMode('select');
                        canvas.setActiveObject(textObj);
                        textObj.enterEditing();
                        textObj.selectAll();
                        saveHistory();
                    });

                    textHighlightRects.push(rect);
                    canvas.add(rect);
                });
                canvas.renderAll();
            }
        }

        function setupCanvasEvents() {
            canvas.on('mouse:down', function(opt) {
                if (isSpaceDown) return;
                
                if (currentMode === 'cut' || currentMode === 'replace-image') {
                    let pointer = canvas.getPointer(opt.e);
                    startX = pointer.x;
                    startY = pointer.y;
                    actionRect = new fabric.Rect({
                        left: startX, top: startY, width: 0, height: 0,
                        fill: currentMode === 'cut' ? 'rgba(239, 68, 68, 0.2)' : 'rgba(59, 130, 246, 0.2)', 
                        stroke: currentMode === 'cut' ? '#ef4444' : '#3b82f6', 
                        strokeWidth: 2, strokeDashArray: [5, 5],
                        selectable: false, evented: false
                    });
                    canvas.add(actionRect);
                }
            });

            canvas.on('mouse:move', function(opt) {
                if ((currentMode === 'cut' || currentMode === 'replace-image') && actionRect) {
                    let pointer = canvas.getPointer(opt.e);
                    actionRect.set({
                        width: Math.abs(pointer.x - startX),
                        height: Math.abs(pointer.y - startY),
                        left: Math.min(pointer.x, startX),
                        top: Math.min(pointer.y, startY)
                    });
                    canvas.renderAll();
                }
            });

            canvas.on('mouse:up', function(opt) {
                if ((currentMode === 'cut' || currentMode === 'replace-image') && actionRect) {
                    const rectProps = {
                        left: actionRect.left, top: actionRect.top,
                        width: actionRect.width, height: actionRect.height
                    };
                    canvas.remove(actionRect);
                    actionRect = null;

                    if (rectProps.width < 10 || rectProps.height < 10) {
                        logVerbose("Selection too small, cancelled.", "warn");
                        return;
                    }

                    if (currentMode === 'cut') {
                        logVerbose("Slicing element from background...");
                        const sliceCanvas = document.createElement('canvas');
                        sliceCanvas.width = rectProps.width * renderScale;
                        sliceCanvas.height = rectProps.height * renderScale;
                        const sCtx = sliceCanvas.getContext('2d');
                        
                        sCtx.drawImage(
                            bgCanvasElement, 
                            rectProps.left * renderScale, rectProps.top * renderScale, 
                            rectProps.width * renderScale, rectProps.height * renderScale,
                            0, 0, sliceCanvas.width, sliceCanvas.height
                        );

                        fabric.Image.fromURL(sliceCanvas.toDataURL('image/png'), (img) => {
                            img.set({ left: rectProps.left, top: rectProps.top, scaleX: 1/renderScale, scaleY: 1/renderScale });
                            
                            const eraser = new fabric.Rect({
                                left: rectProps.left, top: rectProps.top, width: rectProps.width, height: rectProps.height,
                                fill: '#ffffff', selectable: false, evented: false, isEraser: true
                            });
                            
                            // Group them so they move together
                            const group = new fabric.Group([eraser, img], {
                                left: rectProps.left, top: rectProps.top
                            });

                            // Add a permanent eraser to the background so the original is hidden
                            const bgEraser = new fabric.Rect({
                                left: rectProps.left, top: rectProps.top, width: rectProps.width, height: rectProps.height,
                                fill: '#ffffff', selectable: false, evented: false, isEraser: true
                            });
                            canvas.add(bgEraser);
                            bgEraser.sendToBack();

                            canvas.add(group);
                            setMode('select');
                            canvas.setActiveObject(group);
                            saveHistory();
                            logVerbose("Element successfully cut and made movable.");
                        });

                    } else if (currentMode === 'replace-image') {
                        logVerbose("Area selected. Prompting for new image...");
                        let input = document.createElement('input');
                        input.type = 'file';
                        input.accept = 'image/*';
                        input.onchange = (e) => {
                            let file = e.target.files[0];
                            let reader = new FileReader();
                            reader.onload = (f) => {
                                fabric.Image.fromURL(f.target.result, (img) => {
                                    let mask = new fabric.Rect({
                                        left: rectProps.left, top: rectProps.top, width: rectProps.width, height: rectProps.height,
                                        fill: '#ffffff', strokeWidth: 0, isEraser: true
                                    });
                                    
                                    img.scaleToWidth(rectProps.width);
                                    img.scaleToHeight(rectProps.height);
                                    img.set({ left: rectProps.left, top: rectProps.top });
                                    
                                    let group = new fabric.Group([mask, img], { left: rectProps.left, top: rectProps.top });
                                    
                                    canvas.add(group);
                                    setMode('select');
                                    canvas.setActiveObject(group);
                                    saveHistory();
                                    logVerbose("Image replaced successfully.");
                                });
                            };
                            reader.readAsDataURL(file);
                        };
                        input.click();
                    }
                }
            });

            canvas.on('object:moving', function(options) {
                const obj = options.target;
                if (targetElement && targetElement !== obj) {
                    const targetCenter = targetElement.getCenterPoint();
                    const objCenter = obj.getCenterPoint();
                    if (Math.abs(objCenter.x - targetCenter.x) < 20) obj.set({ left: targetCenter.x - (obj.width * obj.scaleX)/2 });
                    if (Math.abs(objCenter.y - targetCenter.y) < 20) obj.set({ top: targetCenter.y - (obj.height * obj.scaleY)/2 });
                } else if (snapEnabled) {
                    obj.set({
                        left: Math.round(obj.left / GRID_SIZE) * GRID_SIZE,
                        top: Math.round(obj.top / GRID_SIZE) * GRID_SIZE
                    });
                }
            });

            canvas.on('selection:created', updatePropertiesPanel);
            canvas.on('selection:updated', updatePropertiesPanel);
            canvas.on('selection:cleared', () => { document.getElementById('textProperties').style.display = 'none'; });

            // Explicit History Triggers
            canvas.on('object:modified', () => { saveHistory(); });
        }

        // --- UI Event Listeners ---
        function setupEventListeners() {
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.onclick = (e) => setMode(e.currentTarget.dataset.mode);
            });

            document.getElementById('themeToggleBtn').onclick = () => {
                const body = document.body;
                if (body.getAttribute('data-theme') === 'light') body.removeAttribute('data-theme');
                else body.setAttribute('data-theme', 'light');
            };

            document.getElementById('toggleLogsBtn').onclick = () => {
                const logs = document.getElementById('floatingLogs');
                const isHidden = window.getComputedStyle(logs).display === 'none';
                logs.style.display = isHidden ? 'flex' : 'none';
            };

            document.getElementById('gridToggleBtn').onclick = (e) => {
                const overlay = document.getElementById('gridOverlay');
                overlay.classList.toggle('active');
                e.target.classList.toggle('active');
                updateGrid();
            };

            document.getElementById('snapToggleBtn').onclick = (e) => {
                snapEnabled = !snapEnabled;
                e.target.classList.toggle('active');
            };

            document.getElementById('targetSnapBtn').onclick = (e) => {
                targetSnapMode = !targetSnapMode;
                e.target.classList.toggle('active');
                if(targetSnapMode) logVerbose("Target Snap Mode: Click an element to set it as the snap target.");
            };

            document.getElementById('addTextBtn').onclick = () => {
                if(!pdfDoc) return alert("Please open a PDF first.");
                setMode('select');
                const center = canvas.getVpCenter();
                const text = new fabric.IText('Double click to edit', {
                    left: center.x - 80, top: center.y - 10, fontFamily: 'Helvetica', fontSize: 20, fill: '#000000'
                });
                canvas.add(text);
                canvas.setActiveObject(text);
                saveHistory();
                logVerbose("Added new text element.");
            };

            document.getElementById('imageInput').addEventListener('change', function(e) {
                if(!pdfDoc) return alert("Please open a PDF first.");
                setMode('select');
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(f) {
                    fabric.Image.fromURL(f.target.result, function(img) {
                        const center = canvas.getVpCenter();
                        img.scaleToWidth(200);
                        img.set({ left: center.x - 100, top: center.y - (img.getScaledHeight()/2) });
                        canvas.add(img);
                        canvas.setActiveObject(img);
                        saveHistory();
                        logVerbose("Added new image element.");
                    });
                };
                reader.readAsDataURL(file);
                e.target.value = ''; 
            });

            document.getElementById('alignCenterH').onclick = () => { const obj = canvas.getActiveObject(); if(obj) { obj.centerH(); obj.setCoords(); canvas.renderAll(); saveHistory(); }};
            document.getElementById('alignCenterV').onclick = () => { const obj = canvas.getActiveObject(); if(obj) { obj.centerV(); obj.setCoords(); canvas.renderAll(); saveHistory(); }};

            document.getElementById('bringFrontBtn').onclick = () => { const obj = canvas.getActiveObject(); if(obj) { canvas.bringToFront(obj); saveHistory(); }};
            document.getElementById('bringForwardBtn').onclick = () => { const obj = canvas.getActiveObject(); if(obj) { canvas.bringForward(obj); saveHistory(); }};
            document.getElementById('sendBackwardBtn').onclick = () => { const obj = canvas.getActiveObject(); if(obj) { canvas.sendBackwards(obj); saveHistory(); }};
            document.getElementById('sendBackBtn').onclick = () => { const obj = canvas.getActiveObject(); if(obj) { canvas.sendToBack(obj); saveHistory(); }};

            document.getElementById('lockBtn').onclick = () => {
                const obj = canvas.getActiveObject();
                if(obj) {
                    obj.lockMovementX = !obj.lockMovementX;
                    obj.lockMovementY = !obj.lockMovementY;
                    obj.lockRotation = !obj.lockRotation;
                    obj.lockScalingX = !obj.lockScalingX;
                    obj.lockScalingY = !obj.lockScalingY;
                    obj.hasControls = !obj.lockMovementX;
                    canvas.renderAll();
                    logVerbose(`Element ${obj.lockMovementX ? 'locked' : 'unlocked'}.`);
                }
            };
            
            // Unified Delete Function
            const delFn = () => {
                const activeObjects = canvas.getActiveObjects();
                if (activeObjects.length) {
                    canvas.discardActiveObject();
                    activeObjects.forEach(function(object) { canvas.remove(object); });
                    logVerbose(`Deleted ${activeObjects.length} element(s).`);
                    saveHistory();
                }
            };
            document.getElementById('deleteBtn').onclick = delFn;
            document.getElementById('deleteToolbarBtn').onclick = delFn;

            document.getElementById('fontFamily').onchange = (e) => updateTextProp('fontFamily', e.target.value);
            document.getElementById('fontSize').onchange = (e) => updateTextProp('fontSize', parseInt(e.target.value));
            document.getElementById('textColor').onchange = (e) => updateTextProp('fill', e.target.value);
            document.getElementById('textAlignLeft').onclick = () => updateTextProp('textAlign', 'left');
            document.getElementById('textAlignCenter').onclick = () => updateTextProp('textAlign', 'center');
            document.getElementById('textAlignRight').onclick = () => updateTextProp('textAlign', 'right');
            document.getElementById('textAlignJustify').onclick = () => updateTextProp('textAlign', 'justify');

            document.getElementById('undoBtn').onclick = undo;
            document.getElementById('redoBtn').onclick = redo;
            document.getElementById('exportBtn').onclick = exportPDF;
        }

        function updatePropertiesPanel() {
            const obj = canvas.getActiveObject();
            if (!obj) {
                document.getElementById('textProperties').style.display = 'none';
                return;
            }
            if (obj.type === 'i-text' || obj.type === 'text') {
                document.getElementById('textProperties').style.display = 'block';
                document.getElementById('fontFamily').value = obj.fontFamily || 'Helvetica';
                document.getElementById('fontSize').value = obj.fontSize || 16;
                document.getElementById('textColor').value = obj.fill || '#000000';
            } else {
                document.getElementById('textProperties').style.display = 'none';
            }
        }

        function updateTextProp(prop, value) {
            const obj = canvas.getActiveObject();
            if (obj && (obj.type === 'i-text' || obj.type === 'text')) {
                obj.set(prop, value);
                canvas.renderAll();
                saveHistory();
            }
        }

        // --- Keyboard Shortcuts ---
        function setupKeyboardShortcuts() {
            window.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || canvas.getActiveObject()?.isEditing) return;

                const obj = canvas.getActiveObject();
                const step = e.shiftKey ? 10 : 1;

                if (e.key === 'Delete' || e.key === 'Backspace') {
                    document.getElementById('deleteBtn').click();
                    e.preventDefault();
                } else if (e.key === 'Escape') {
                    setMode('select');
                } else if (e.ctrlKey && e.key === 'c') {
                    if(obj) obj.clone((cloned) => { window.clipboard = cloned; logVerbose("Element copied."); });
                } else if (e.ctrlKey && e.key === 'v') {
                    if(window.clipboard) {
                        window.clipboard.clone((clonedObj) => {
                            canvas.discardActiveObject();
                            clonedObj.set({ left: clonedObj.left + 10, top: clonedObj.top + 10, evented: true });
                            if (clonedObj.type === 'activeSelection') {
                                clonedObj.canvas = canvas;
                                clonedObj.forEachObject((o) => canvas.add(o));
                                clonedObj.setCoords();
                            } else {
                                canvas.add(clonedObj);
                            }
                            window.clipboard.top += 10; window.clipboard.left += 10;
                            canvas.setActiveObject(clonedObj);
                            canvas.requestRenderAll();
                            logVerbose("Element pasted.");
                            saveHistory();
                        });
                    }
                } else if (e.ctrlKey && e.key === 'z') {
                    undo();
                } else if (e.ctrlKey && e.key === 'y') {
                    redo();
                } else if (obj && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    let newTop = obj.top;
                    let newLeft = obj.left;
                    
                    if (e.key === 'ArrowUp') newTop -= step;
                    if (e.key === 'ArrowDown') newTop += step;
                    if (e.key === 'ArrowLeft') newLeft -= step;
                    if (e.key === 'ArrowRight') newLeft += step;
                    
                    if(snapEnabled) {
                        newLeft = Math.round(newLeft / GRID_SIZE) * GRID_SIZE;
                        newTop = Math.round(newTop / GRID_SIZE) * GRID_SIZE;
                    }
                    
                    obj.set({ top: newTop, left: newLeft });
                    obj.setCoords();
                    canvas.renderAll();
                    saveHistory();
                }
            });
        }

        // --- Explicit Undo / Redo Stack ---
        function getCanvasState() {
            const json = canvas.toJSON(['isEraser']); // Preserve custom properties
            delete json.backgroundImage; 
            return json;
        }

        function saveHistory() {
            if (isHistoryAction || !pdfDoc) return;
            if (!pageHistories[currentPageNum]) {
                pageHistories[currentPageNum] = { history:[], index: -1 };
            }
            const ph = pageHistories[currentPageNum];
            
            // Truncate future history if we are overwriting after an undo
            if (ph.index < ph.history.length - 1) {
                ph.history = ph.history.slice(0, ph.index + 1);
            }
            
            ph.history.push(getCanvasState());
            ph.index++;
            saveToLocal();
        }

        function loadState(state) {
            const bgImage = canvas.backgroundImage; 
            canvas.loadFromJSON(state, () => {
                canvas.setBackgroundImage(bgImage, () => {
                    canvas.renderAll();
                    isHistoryAction = false;
                    saveToLocal();
                });
            });
        }

        function undo() {
            const ph = pageHistories[currentPageNum];
            if (ph && ph.index > 0) {
                isHistoryAction = true;
                ph.index--;
                loadState(ph.history[ph.index]);
                logVerbose("Undo performed.");
            }
        }

        function redo() {
            const ph = pageHistories[currentPageNum];
            if (ph && ph.index < ph.history.length - 1) {
                isHistoryAction = true;
                ph.index++;
                loadState(ph.history[ph.index]);
                logVerbose("Redo performed.");
            }
        }

        // --- Local Auto-Save ---
        function saveToLocal() {
            if(pdfDoc) {
                try {
                    pageCanvases[currentPageNum] = getCanvasState();
                    localStorage.setItem('pdf_editor_draft', JSON.stringify(pageCanvases));
                } catch (e) {
                    logVerbose("Failed to save draft to localStorage (Quota exceeded?).", "warn");
                }
            }
        }

        function loadAutoSave() {
            const draft = localStorage.getItem('pdf_editor_draft');
            if (draft) {
                try {
                    pageCanvases = JSON.parse(draft);
                    logVerbose("Draft loaded from localStorage. Upload the original PDF to apply.");
                } catch (e) {
                    console.error("Failed to parse draft", e);
                }
            }
        }

        // --- Export PDF (pdf-lib) ---
        async function exportPDF() {
            if (!pdfBytesOriginal) return;
            
            showLoading(true, "Exporting PDF...");
            document.getElementById('exportBtn').innerText = "Exporting...";
            
            try {
                logVerbose("Saving current page state...");
                pageCanvases[currentPageNum] = getCanvasState();

                logVerbose("Loading original PDF vector data into pdf-lib...");
                const pdfDocLib = await PDFLib.PDFDocument.load(pdfBytesOriginal);
                const pages = pdfDocLib.getPages();

                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    const pageData = pageCanvases[i];
                    if (!pageData || pageData.objects.length === 0) continue;

                    logVerbose(`Processing edits for Page ${i}...`);
                    const pdfPage = pages[i - 1];
                    const { width, height } = pdfPage.getSize();
                    
                    const tempCanvas = new fabric.StaticCanvas(null, { width: width, height: height });
                    await new Promise(resolve => tempCanvas.loadFromJSON(pageData, resolve));
                    
                    const objects = tempCanvas.getObjects();
                    let flatObjects =[];
                    
                    objects.forEach(obj => {
                        if (obj.type === 'group') {
                            const groupObjects = obj.getObjects();
                            const groupMatrix = obj.calcTransformMatrix();
                            groupObjects.forEach(gObj => {
                                const matrix = fabric.util.multiplyTransformMatrices(groupMatrix, gObj.calcTransformMatrix());
                                const options = fabric.util.qrDecompose(matrix);
                                const absObj = fabric.util.object.clone(gObj);
                                absObj.set({
                                    left: options.translateX, top: options.translateY,
                                    scaleX: options.scaleX, scaleY: options.scaleY,
                                    angle: options.angle,
                                    isEraser: gObj.isEraser
                                });
                                flatObjects.push(absObj);
                            });
                        } else {
                            flatObjects.push(obj);
                        }
                    });

                    for (const obj of flatObjects) {
                        const yPos = height - obj.top - (obj.height * obj.scaleY);

                        if (obj.type === 'rect' || obj.isEraser) {
                            const rgb = hexToRgb(obj.fill || '#ffffff');
                            pdfPage.drawRectangle({
                                x: obj.left, y: yPos, width: obj.width * obj.scaleX, height: obj.height * obj.scaleY,
                                color: PDFLib.rgb(rgb.r/255, rgb.g/255, rgb.b/255)
                            });
                        } else if (obj.type === 'i-text' || obj.type === 'text') {
                            let font;
                            if(obj.fontFamily === 'Times New Roman') font = await pdfDocLib.embedFont(PDFLib.StandardFonts.TimesRoman);
                            else if(obj.fontFamily === 'Courier') font = await pdfDocLib.embedFont(PDFLib.StandardFonts.Courier);
                            else font = await pdfDocLib.embedFont(PDFLib.StandardFonts.Helvetica);

                            const rgb = hexToRgb(obj.fill || '#000000');
                            const lines = obj.textLines || obj.text.split('\n');
                            const lineHeight = obj.fontSize * obj.lineHeight;
                            
                            lines.forEach((line, index) => {
                                let lineWidth = font.widthOfTextAtSize(line, obj.fontSize);
                                let offsetX = 0;
                                if (obj.textAlign === 'center') offsetX = (obj.width - lineWidth) / 2;
                                else if (obj.textAlign === 'right') offsetX = obj.width - lineWidth;
                                
                                pdfPage.drawText(line, {
                                    x: obj.left + offsetX,
                                    y: height - obj.top - obj.fontSize - (index * lineHeight),
                                    size: obj.fontSize, font: font, color: PDFLib.rgb(rgb.r/255, rgb.g/255, rgb.b/255)
                                });
                            });
                        } else if (obj.type === 'image') {
                            const imgData = obj.getSrc();
                            let embeddedImage;
                            if (imgData.includes('image/png')) embeddedImage = await pdfDocLib.embedPng(imgData);
                            else if (imgData.includes('image/jpeg')) embeddedImage = await pdfDocLib.embedJpg(imgData);
                            
                            if (embeddedImage) {
                                pdfPage.drawImage(embeddedImage, {
                                    x: obj.left, y: yPos, width: obj.width * obj.scaleX, height: obj.height * obj.scaleY
                                });
                            }
                        }
                    }
                }

                logVerbose("Compiling final PDF bytes...");
                const pdfBytes = await pdfDocLib.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'edited_document.pdf';
                link.click();
                logVerbose("Export successful!");

            } catch (error) {
                logVerbose(`Export failed: ${error.message}`, "error");
                alert("An error occurred during export. Check logs.");
            } finally {
                document.getElementById('exportBtn').innerHTML = '<i class="fas fa-download"></i> Export';
                setTimeout(() => showLoading(false), 1500);
            }
        }

        function hexToRgb(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 0, g: 0, b: 0 };
        }

        init();
    </script>
